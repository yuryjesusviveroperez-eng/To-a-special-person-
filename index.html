<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestro Universo ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

overflow:hidden;
height:100vh;
background:linear-gradient(#020111,#191970,#000);
color:white;

}

/* ========================= */

#stars{

position:fixed;
width:100%;
height:100%;
left:0;
top:0;
overflow:hidden;

}

.star{

position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;

}

@keyframes twinkle{

0%{
opacity:.2;
transform:scale(1);
}

50%{
opacity:1;
transform:scale(1.6);
}

100%{
opacity:.2;
transform:scale(1);
}

}

/* ========================= */

#moon{

position:absolute;

right:80px;
top:60px;

width:140px;
height:140px;

border-radius:50%;

background:white;

box-shadow:

0 0 40px white,
0 0 80px white,
0 0 150px white;

}

/* ========================= */

#welcome{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

text-align:center;

animation:fade 2s;

}

#welcome h1{

font-size:55px;

}

#welcome h2{

margin-top:20px;
font-weight:300;

}

@keyframes fade{

from{

opacity:0;
transform:translate(-50%,-40%);

}

to{

opacity:1;
transform:translate(-50%,-50%);

}

}

#enter{

margin-top:45px;

padding:18px 45px;

border:none;

border-radius:40px;

font-size:22px;

background:#ff2d75;

color:white;

cursor:pointer;

transition:.4s;

}

#enter:hover{

transform:scale(1.08);

background:#ff4d90;

box-shadow:0 0 30px hotpink;

}

/* ========================= */

#main{

display:none;

position:absolute;

width:100%;
height:100%;

overflow:auto;

padding-bottom:100px;

}

header{

margin-top:40px;

text-align:center;

}

header h1{

font-size:45px;

}

header p{

margin-top:10px;

font-size:20px;

opacity:.8;

}

.card{

width:90%;
max-width:900px;

margin:30px auto;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border-radius:25px;

padding:30px;

box-shadow:0 0 25px rgba(255,255,255,.08);

}

.card h2{

margin-bottom:15px;

}

#contador{

font-size:32px;

text-align:center;

margin-top:20px;

font-weight:bold;

}

#loveButton{

display:block;

margin:auto;

margin-top:40px;

padding:25px 45px;

font-size:28px;

border:none;

border-radius:60px;

background:#ff2f73;

color:white;

cursor:pointer;

transition:.3s;

}

#loveButton:hover{

transform:scale(1.1);

box-shadow:0 0 30px hotpink;

}

#loveCounter{

font-size:60px;

text-align:center;

margin-top:30px;

}

#level{

font-size:25px;

text-align:center;

margin-top:15px;

color:gold;
}
<script src="script.js"></script>
</body>
</html>
